[package]
name = "astracat-dns-rs"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.28", features = ["full"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
hickory-server = "0.24"
hickory-proto = "0.24"
hickory-resolver = "0.24"
prometheus = "0.13"
lazy_static = "1.4"
log = "0.4"
env_logger = "0.10"
lmdb-rkv = "0.14"
tempfile = "3.8"
futures = "0.3"
hyper = { version = "0.14", features = ["full"] }
parking_lot = "0.12"
reqwest = { version = "0.11", features = ["blocking", "rustls-tls"] }
async-trait = "0.1"
thiserror = "1.0"
humantime-serde = "1.1.1"
sysinfo = "0.37.2"
dashmap = "6.1.0"
serde_json = "1.0.147"
lru = "0.16.2"
bincode = "1.3"
async-channel = "2.5.0"
