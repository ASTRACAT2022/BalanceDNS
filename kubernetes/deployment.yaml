apiVersion: apps/v1
kind: Deployment
metadata:
  name: astracat-dns
  namespace: default
  labels:
    app: astracat-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: astracat-dns
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: astracat-dns
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: astracat-dns
          image: astracat-dns:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
            - containerPort: 853
              protocol: TCP
            - containerPort: 443
              protocol: TCP
            - containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: cache-volume
              mountPath: /app/cache
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: cache-volume
          emptyDir: {}
