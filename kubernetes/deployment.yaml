apiVersion: apps/v1
kind: Deployment
metadata:
  name: astracat-dns
  namespace: default
  labels:
    app: astracat-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: astracat-dns
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: astracat-dns
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: astracat-dns
          image: ghcr.io/astracat2022/astracatdns:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
            - containerPort: 853
              protocol: TCP
            - containerPort: 443
              protocol: TCP
            - containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: cert-volume
              mountPath: /app/cert
              readOnly: true
            - name: cache-volume
              mountPath: /app/cache
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config-volume
          configMap:
            name: astracat-config
        - name: cert-volume
          secret:
            secretName: astracat-tls
            optional: true # Don't crash if secret missing, but TLS won't work
        - name: cache-volume
          emptyDir: {}
