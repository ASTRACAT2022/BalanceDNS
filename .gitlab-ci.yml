stages:
  - build

variables:
  DOCKER_IMAGE: "astracat-dns"
  TAG: "latest"

build:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    - apk add --no-cache openssl
    - mkdir -p cert
    - |
      if [ ! -f cert/privkey.pem ] || [ ! -f cert/fullchain.pem ]; then
        echo "Generating self-signed certificates..."
        openssl req -x509 -newkey rsa:4096 -keyout cert/privkey.pem -out cert/fullchain.pem -days 365 -nodes -subj "/C=US/ST=State/L=City/O=Organization/CN=localhost"
      fi
  script:
    - docker build -t $DOCKER_IMAGE:$TAG .
    # Note: In a real environment, you would push this image to a registry.
    # - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # - docker push $DOCKER_IMAGE:$TAG
  tags:
    - docker
