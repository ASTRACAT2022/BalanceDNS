version: '3.8'

services:
  astracat-dns:
    # Use the image from Docker Hub (once pushed) or build locally
    # image: astracat2022/astracat-dns:latest
    build: .
    container_name: astracat-dns 
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "443:443/tcp"   # DoH
      - "853:853/tcp"   # DoT
      - "9090:9090/tcp" # Metrics
      - "8080:8080/tcp" # Admin
    environment:
      # --- Network Configuration ---
      - LISTEN_ADDR=0.0.0.0:53
      - METRICS_ADDR=0.0.0.0:9090
      - ADMIN_ADDR=0.0.0.0:8080
      - DOH_ADDR=0.0.0.0:443
      - DOT_ADDR=0.0.0.0:853

      # --- Performance & Cache ---
      - CACHE_SIZE=1024
      - CACHE_RAM_SIZE=50
      - MAX_WORKERS=10
      - GOMAXPROCS=1

      # --- Features ---
      - ADBLOCK_ENABLED=true
      - HOSTS_ENABLED=true

      # --- SSL Certificates (Injected as text) ---
      # You can paste the content of your certificate and key here.
      # It is recommended to use an .env file for security to avoid committing keys to repo.
      # Example:
      # SSL_CERT_CONTENT="-----BEGIN CERTIFICATE-----\nMIIDXTCCAkWgAwIBAgIJAL...\n-----END CERTIFICATE-----"
      # SSL_KEY_CONTENT="-----BEGIN PRIVATE KEY-----\nMIIEvgIBADANBgkqhkiG9w0B...\n-----END PRIVATE KEY-----"

      # Alternatively, you can map the .env file variables:
      # SSL_CERT_CONTENT=${SSL_CERT_CONTENT}
      # SSL_KEY_CONTENT=${SSL_KEY_CONTENT}

    restart: always
    # Capablities might be needed for binding to port 53 if not root,
    # but the container runs as root by default usually.
    # cap_add:
    #   - NET_BIND_SERVICE
