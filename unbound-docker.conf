server:
    verbosity: 1
    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes
    
    # Allow Docker subnet access
    access-control: 0.0.0.0/0 allow
    
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: no
    edns-buffer-size: 1232
    prefetch: no
    num-threads: 2
    
    # Minimal cache (Rust handles it)
    msg-cache-size: 1m
    rrset-cache-size: 1m
    cache-max-ttl: 0
    infra-cache-numhosts: 100
