[server]
udp_listen = "[::]:53"
tcp_listen = "[::]:53"
dot_listen = "[::]:853"
doh_listen = "[::]:443"

[tls]
cert_pem = "/etc/astracat-dns/tls/server.crt"
key_pem = "/etc/astracat-dns/tls/server.key"

[balancing]
algorithm = "round_robin"

[security]
deny_any = true
deny_dnskey = true
request_timeout_ms = 1500

[metrics]
listen = "127.0.0.1:9100"

[hosts_remote]
url = "https://raw.githubusercontent.com/ASTRACAT2022/host-DNS/refs/heads/main/bypass"
refresh_seconds = 300
ttl_seconds = 60

[[upstreams]]
name = "cloudflare-doh"
proto = "doh"
url = "https://cloudflare-dns.com/dns-query"
pool = "default"
weight = 1

[[upstreams]]
name = "cloudflare-dot"
proto = "dot"
addr = "1.1.1.1:853"
server_name = "cloudflare-dns.com"
pool = "default"
weight = 1

[[upstreams]]
name = "google-udp"
proto = "udp"
addr = "8.8.8.8:53"
pool = "default"
weight = 1
