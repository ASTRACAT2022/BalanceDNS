[server]
udp_listen = "0.0.0.0:5353"
tcp_listen = "0.0.0.0:5353"
dot_listen = "0.0.0.0:8853"
doh_listen = "0.0.0.0:8443"

[tls]
cert_pem = "tls/server.crt"
key_pem = "tls/server.key"

[balancing]
algorithm = "round_robin"

[security]
deny_any = true
deny_dnskey = true
request_timeout_ms = 3000

[cache]
enabled = true
max_size = 20000
ttl_seconds = 600

[metrics]
listen = "127.0.0.1:9100"

[hosts_local]
# Local overrides can be added here, e.g.:
# "example.com." = "1.2.3.4"

[hosts_remote]
url = "https://raw.githubusercontent.com/ASTRACAT2022/host-DNS/refs/heads/main/bypass"
refresh_seconds = 300
ttl_seconds = 60

[blocklist_remote]
url = "https://raw.githubusercontent.com/Zalexanninev15/NoADS_RU/main/ads_list.txt"
refresh_seconds = 300

[[upstreams]]
name = "cloudflare-doh"
proto = "doh"
url = "https://1.1.1.1/dns-query"
pool = "default"
weight = 5

[[upstreams]]
name = "google-doh"
proto = "doh"
url = "https://8.8.8.8/dns-query"
pool = "default"
weight = 5

[[upstreams]]
name = "cloudflare-udp"
proto = "udp"
addr = "1.1.1.1:53"
pool = "default"
weight = 1

[[upstreams]]
name = "google-udp"
proto = "udp"
addr = "8.8.8.8:53"
pool = "default"
weight = 1
