<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}ASTRACAT DNS{{end}}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #ffffff;
            --accent-hover: #cccccc;
            --border: #333;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        /* Cyberpunk-ish header */
        .navbar {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .navbar a {
            text-decoration: none;
            color: var(--text-muted);
            margin-left: 1.5rem;
            transition: color 0.2s;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .navbar a:hover, .navbar a.active {
            color: var(--accent);
        }

        .container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        h1, h2, h3 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
        }

        input, textarea, select {
            background-color: #000;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem;
            width: 100%;
            box-sizing: border-box;
            border-radius: 2px;
            margin-bottom: 1rem;
            font-family: monospace;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
            border-radius: 2px;
            display: inline-block;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background-color: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background-color: var(--danger);
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-item {
            background-color: #000;
            border: 1px solid var(--border);
            padding: 1.5rem;
            text-align: center;
        }

        .stat-item .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
            font-family: monospace;
        }

        .stat-item .label {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .message {
            padding: 1rem;
            background-color: rgba(46, 204, 113, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            margin-bottom: 1rem;
            border-radius: 2px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">ASTRACAT</div>
        <div>
            <a href="/">Dashboard</a>
            <a href="/plugins">Plugins</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
    <div class="container">
        {{block "content" .}}{{end}}
    </div>
</body>
</html>
