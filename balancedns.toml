[server]
udp_listen = "144.31.151.64:53"
tcp_listen = "144.31.151.64:53"
dot_listen = "144.31.151.64:853"
doh_listen = "144.31.151.64:443"

[tls]
cert_pem = "/var/lib/balancedns/tls/server.crt"
key_pem = "/var/lib/balancedns/tls/server.key"

[balancing]
algorithm = "fastest"

[security]
deny_any = true
deny_dnskey = true
request_timeout_ms = 500

[cache]
enabled = true
max_size = 100000
ttl_seconds = 7200
min_ttl = 60
max_ttl = 86400
decrement_ttl = true

[metrics]
listen = "127.0.0.1:9100"

[global]
threads_udp = 8
threads_tcp = 4
max_tcp_clients = 4096
max_waiting_clients = 1000000
max_active_queries = 200000
max_clients_waiting_for_query = 2000

[hosts_local]
# "example.com." = "1.2.3.4"

[hosts_remote]
url = "https://raw.githubusercontent.com/ASTRACAT2022/host-DNS/refs/heads/main/bypass"
refresh_seconds = 300
ttl_seconds = 300

[blocklist_remote]
url = "https://raw.githubusercontent.com/Zalexanninev15/NoADS_RU/main/ads_list.txt"
refresh_seconds = 600

[plugins]
libraries = []

[[upstreams]]
name = "upstream-1"
proto = "udp"
addr = "95.85.95.85:53"
pool = "default"
weight = 5

[[upstreams]]
name = "upstream-2"
proto = "udp"
addr = "2.56.220.2:53"
pool = "default"
weight = 5

[[upstreams]]
name = "cloudflare-udp"
proto = "udp"
addr = "1.1.1.1:53"
pool = "default"
weight = 3

[[upstreams]]
name = "google-udp"
proto = "udp"
addr = "8.8.8.8:53"
pool = "default"
weight = 3

[[routing_rules]]
suffix = "."
upstreams = ["upstream-1", "upstream-2", "cloudflare-udp", "google-udp"]
